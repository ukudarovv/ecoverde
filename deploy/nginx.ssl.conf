server {
    listen 80;
    server_name ecoverde.kz www.ecoverde.kz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ecoverde.kz www.ecoverde.kz;

    ssl_certificate /etc/letsencrypt/live/ecoverde.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ecoverde.kz/privkey.pem;

    root /opt/ecoverde/frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:8000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /opt/ecoverde/backend/staticfiles/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
