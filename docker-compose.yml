services:
  backend:
    build: ./backend
    env_file: .env
    volumes:
      - sqlite_data:/app/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  telegram-bot:
    build: ./backend
    entrypoint: ["/app/entrypoint.sh"]
    command: ["python", "manage.py", "run_telegram_bot"]
    env_file: .env
    volumes:
      - sqlite_data:/app/data
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
        VITE_TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-ecoverde_bot}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlite_data:
